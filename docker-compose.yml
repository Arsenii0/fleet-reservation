name: fleet

services:
  reservation:
    image: golang:1.25
    ports:
      - "50051:50051"
      - "8080:8080"
    volumes:
      - .:/reservation
      - go-cache:/go/pkg/mod
    working_dir: /reservation
    environment:
      - ENV=dev
      - APPLICATION_PORT=50051
      # DB
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=postgres
      - DB_PORT=5432
      # KAFKA
      - KAFKA_BROKERS=kafka:9092
      # Cleanup
      - TIMER_INTERVAL_IN_SECONDS=${TIMER_INTERVAL_IN_SECONDS:-600}
      - CLEANUP_SIZE=${CLEANUP_SIZE:-40}
    command: go run reservation/cmd/main.go
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  db:
    image: postgres:latest
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka setup
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    ports:
      - 9092:9092
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: [ "CMD", "sh", "-c", "kafka-topics --bootstrap-server localhost:9092 --list" ]
      interval: 30s
      timeout: 10s
      retries: 3

  deployer:
    build:
      context: .
      dockerfile: deployer/Dockerfile.service
    volumes:
      - .:/reservation
      - go-cache:/go/pkg/mod
      - terraform-state:/var/lib/fleet-terraform
      - terraform-plugin-cache:/terraform-plugin-cache
      - ${HOME}/.aws:/root/.aws:ro
    working_dir: /reservation
    environment:
      - KAFKA_BROKERS=kafka:9092
      - SERVICE_NAME=fleet-deployer
      - KAFKA_GROUP_ID=FLEET_DEPLOYER_GROUP
      - TF_PLUGIN_CACHE_DIR=/terraform-plugin-cache
      - AWS_REGION=${AWS_REGION:-us-west-2}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
    command: go run deployer/cmd/main.go
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  go-cache:
  terraform-state:
  terraform-plugin-cache:
